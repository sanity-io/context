name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to NPM
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-please:
    permissions:
      id-token: write # to enable use of OIDC for npm provenance
      # permissions for pushing commits and opening PRs are handled by the `generate-token` step
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}
      # This action will create a release PR when regular conventional commits are pushed to main,
      # it'll also detect if a release PR is merged and npm publish should happen
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      # Publish to NPM on new releases
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}

      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm install --ignore-scripts

      - name: Build
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm --filter @sanity/context build

      - name: Set publishing config
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm config set '//registry.npmjs.org/:_authToken' "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      # Release Please has already incremented versions and published tags, so we just
      # need to publish the new version to npm here
      - name: Publish to npm
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm --filter @sanity/context publish
        env:
          NPM_CONFIG_PROVENANCE: true

      # Create changelog release in Sanity (needs manual review and publish in Studio)
      - name: Create changelog release
        id: changelog
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm release-notes create ${{ steps.release.outputs['packages/context--version'] }} --yes
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CHANGELOG_SANITY_PROJECT_ID: ${{ vars.CHANGELOG_SANITY_PROJECT_ID }}
          CHANGELOG_SANITY_DATASET: ${{ vars.CHANGELOG_SANITY_DATASET }}
          CHANGELOG_SANITY_WRITE_TOKEN: ${{ secrets.CHANGELOG_SANITY_WRITE_TOKEN }}
          CHANGELOG_ANTHROPIC_API_KEY: ${{ secrets.CHANGELOG_ANTHROPIC_API_KEY }}
          CHANGELOG_STUDIO_BASE_URL: ${{ vars.CHANGELOG_STUDIO_BASE_URL }}

      - name: Convert changelog to Slack markdown
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: LoveToKnow/slackify-markdown-action@698a1d4d0ff1794152a93c03ee8ca5e03a310d4e # v1.1.1
        id: changelog-markdown
        with:
          text: ${{ steps.release.outputs['packages/context--body'] }}

      - name: Notify Slack
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.CHANGELOG_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "@sanity/context v${{ steps.release.outputs['packages/context--version'] }} released"
              - type: section
                text:
                  type: mrkdwn
                  text: "A changelog draft for this release is ready. <${{ steps.changelog.outputs.studio_url || vars.CHANGELOG_STUDIO_BASE_URL }}|Review and publish in Studio>."
              - type: section
                text:
                  type: mrkdwn
                  text: ${{ toJson(steps.changelog-markdown.outputs.text) }}
